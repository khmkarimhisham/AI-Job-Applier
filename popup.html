<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Job Applier</title>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      margin: 0;
      text-align: center;
    }
    h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #2563eb;
    }
    p {
      font-size: 0.875rem;
      color: #4b5563;
      margin-bottom: 16px;
    }
    .button {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      text-align: center;
      border: none;
      border-radius: 4px;
      font-weight: 500;
      cursor: pointer;
    }
    .button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <h2>AI Job Applier</h2>
  <p>Make sure you've uploaded your context before applying!</p>
  <button id="autofillBtn" class="button" style="margin-bottom: 12px; background-color: #10b981;">✨ Autofill Page</button>
  <button id="openOptions" class="button">Open Settings</button>

  <script src="popup.js"></script>
</body>
</html>
