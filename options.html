<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>AI Job Applier Settings</title>
  <style>
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; 
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; 
    }

    :root {
      --bg-color: #0f172a;
      --panel-bg: #1e293b;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
    }

    body {
      width: 100%;
      max-width: 1200px;
      min-width: 800px;
      padding: 24px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0 auto;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100vh;
      overflow: hidden;
    }

    h2 {
      margin: 0;
      font-size: 1.5rem;
      color: var(--text-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h2 span {
      font-size: 0.875rem;
      font-weight: normal;
      color: var(--text-muted);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--panel-bg);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-color);
      font-size: 0.875rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    select {
      width: 100%;
      padding: 10px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-color);
      font-size: 0.875rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    /* Main Workspace Layout */
    .workspace {
      display: flex;
      gap: 20px;
      flex: 1;
      overflow: hidden;
    }

    /* Left Sidebar: File List */
    .file-sidebar {
      width: 250px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header span {
      font-weight: 600;
      font-size: 0.875rem;
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      margin: 0;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .file-item {
      padding: 10px 12px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.875rem;
    }

    .file-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .file-item.active {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      font-weight: 600;
    }

    .file-item.dragging {
      opacity: 0.5;
    }

    .file-item.drag-over {
      border: 2px dashed var(--primary);
    }

    .file-actions {
      display: none;
      gap: 4px;
    }

    .file-item:hover .file-actions {
      display: flex;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      color: var(--text-color);
      background: rgba(255,255,255,0.1);
    }

    .icon-btn.rename:hover {
      color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
    }

    .icon-btn.download:hover {
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .icon-btn.delete:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
    }

    /* Right Area: Editor */
    .editor-container {
      flex: 1;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
      overflow: hidden;
    }

    .editor-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editor-header input.filename-input {
      background: transparent;
      border: none;
      color: var(--text-color);
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      outline: none;
      border-bottom: 1px solid transparent;
      transition: border-bottom-color 0.2s;
    }

    .editor-header input.filename-input:hover {
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .editor-header input.filename-input:focus {
      border-bottom: 1px solid var(--primary);
    }

    .editor-textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-color);
      padding: 16px;
      font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
      font-size: 0.875rem;
      resize: none;
      box-sizing: border-box;
      outline: none;
    }

    /* Controls and Buttons */
    .button {
      padding: 8px 16px;
      background-color: var(--primary);
      color: white;
      text-align: center;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .button:hover {
      background-color: var(--primary-hover);
    }

    .button.secondary {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }

    .button.secondary:hover {
      background-color: rgba(255,255,255,0.05);
    }

    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .status {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
    }

    .status.show {
      opacity: 1;
    }

    .status.success {
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border-color: rgba(16, 185, 129, 0.2);
    }

    .status.error {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border-color: rgba(239, 68, 68, 0.2);
    }

    .hidden {
      display: none !important;
    }

    #fileUpload {
      display: none;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 12px;
    }
  </style>
</head>
<body>
  <h2>
    AI Job Applier
    <span>Settings & Context Editor</span>
  </h2>
  
  <div style="display: flex; gap: 20px;">
    <div class="form-group" style="flex: 1;">
      <label for="ollamaUrl">Ollama Host URL</label>
      <input type="text" id="ollamaUrl" placeholder="http://localhost:11434" value="http://localhost:11434">
    </div>
    <div class="form-group" style="flex: 1;">
      <label for="ollamaModel" style="display: flex; justify-content: space-between;">
        Ollama Model
        <button id="refreshModelsBtn" class="icon-btn" style="padding: 0; margin-top: -2px;" title="Refresh Models">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
      </label>
      <select id="ollamaModel">
        <option value="" disabled selected>Select a model</option>
      </select>
    </div>
  </div>
  
  <div class="workspace">
    <!-- File List Sidebar -->
    <div class="file-sidebar">
      <div class="sidebar-header">
        <span>Context Files</span>
        <button class="icon-btn" id="addFileBtn" title="Add File">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
      <ul class="file-list" id="fileList">
        <!-- File items will be injected here -->
      </ul>
      <div style="padding: 12px;">
        <label for="fileUpload" class="button" style="width: 100%; justify-content: center; box-sizing: border-box;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          Upload
        </label>
        <input type="file" id="fileUpload" multiple accept=".txt,.md">
      </div>
    </div>

    <!-- Editor Area -->
    <div class="editor-container" id="editorContainer">
      <div class="empty-state" id="editorEmptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>Select a file to edit or create a new one</span>
      </div>

      <div class="editor-content hidden" id="editorContent">
        <div class="editor-header">
          <input type="text" class="filename-input" id="filenameInput" placeholder="filename.txt">
        </div>
        <textarea class="editor-textarea" id="fileEditor" spellcheck="false" placeholder="Enter context here..."></textarea>
      </div>
    </div>
  </div>

  <div class="actions-bar">
    <div id="statusArea" class="status"></div>
    <button id="saveBtn" class="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      Save Changes
    </button>
  </div>

  <script src="options.js"></script>
</body>
</html>
